<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sphere position="0 1.25 -4" radius="1.25" color="white"></a-sphere>
      <a-sphere position="0 3 -4" radius="1" color="white"></a-sphere>
      <a-sphere position="0 4.50 -4" radius="0.75" color="white"></a-sphere>
      <a-cylinder position="0 9 -4" radius="0.50" height="8" color="black"></a-cylinder>
      <a-cylinder position="0 5.0 -4" radius="1.5" height="0.25" color="black"></a-cylinder>
      <a-plane position="0 0.1 -4" rotation="-90 0 0" width="4" height="4" color="#2e1918"></a-plane>
      <a-cone src="" height="4" radius-bottom="0.25" radius-top="0" position="0 4.50 -2" color="#ff8000" rotation="90 0 0"></a-cone>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: egypt; dressingAmount: 500"></a-entity>
    </a-scene>
  </body>
</html>
